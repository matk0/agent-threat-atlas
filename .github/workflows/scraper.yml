name: Daily incident scraper + deploy

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  push:
    branches: [main]
    paths:
      - '.github/workflows/scraper.yml'
      - 'app/**'
      - 'components/**'
      - 'content/**'
      - 'lib/**'
      - 'next.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.mjs'
      - 'public/**'
      - 'scripts/build-locales.mjs'
      - 'scripts/example-scraper.py'
      - 'scripts/requirements.txt'
      - 'scripts/smoke-production.mjs'
      - 'scripts/sources.py'
      - 'scripts/test_scraper_contract.py'
      - 'scripts/translate-content.mjs'
      - 'tailwind.config.ts'
      - 'tsconfig.json'
      - 'wrangler.jsonc'
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      limit:
        description: 'Max candidates to classify'
        required: false
        default: '100'
      backfill_days:
        description: 'Trusted-source backfill window in days'
        required: false
        default: '30'

permissions:
  contents: write           # needed to commit incidents.ts back to main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  scrape:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run scraper
        env:
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: stepfun-ai/step-3.5-flash
          SCRAPER_LIMIT: ${{ github.event.inputs.limit || '100' }}
          SCRAPER_BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '30' }}
        run: python3 scripts/example-scraper.py

      - name: Publish source health summary
        if: always()
        run: |
          if test -f tmp/source-health.md; then
            cat tmp/source-health.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Translate Slovak content
        env:
          DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
        run: node scripts/translate-content.mjs

      - name: Commit and push updated incidents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/incidents.en.ts content/*.sk.ts content/deepl.sk.cache.json
          test ! -f content/rejected-candidates.json || git add content/rejected-candidates.json
          git diff --staged --quiet && echo "No incident feed changes." && exit 0
          git commit -m "Update incident feed $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: [scrape]
    if: >
      always() &&
      (github.event_name == 'push' || needs.scrape.result == 'success') &&
      (github.event_name != 'push' || github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4.87.0 deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test production
        run: npm run smoke:production
