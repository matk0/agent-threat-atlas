name: Daily incident scraper

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit incidents.ts back to main

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/example-scraper.py

      - name: Commit and push updated incidents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/incidents.ts
          git diff --staged --quiet && echo "No new incidents." && exit 0
          git commit -m "Update incident feed $(date -u +%Y-%m-%d)"
          git push
