name: Daily incident scraper + deploy

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  push:
    branches: [main]
    paths:
      - '.github/workflows/scraper.yml'
      - 'app/**'
      - 'components/**'
      - 'content/**'
      - 'lib/**'
      - 'next.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.mjs'
      - 'public/**'
      - 'tailwind.config.ts'
      - 'tsconfig.json'
      - 'wrangler.jsonc'
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      limit:
        description: 'Max candidates to classify'
        required: false
        default: '80'

permissions:
  contents: write           # needed to commit incidents.ts back to main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  scrape:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: stepfun-ai/step-3.5-flash
          SCRAPER_LIMIT: ${{ github.event.inputs.limit || '80' }}
        run: python3 scripts/example-scraper.py

      - name: Commit and push updated incidents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/incidents.ts
          git diff --staged --quiet && echo "No new incidents." && exit 0
          git commit -m "Update incident feed $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: [scrape]
    if: >
      always() &&
      (github.event_name == 'push' || needs.scrape.result == 'success') &&
      (github.event_name != 'push' || github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.87.0'

      - name: Smoke test production
        run: |
          curl --fail --silent --show-error --retry 24 --retry-delay 10 --retry-all-errors https://atlas.clawforceone.ai/incidents > /dev/null
          curl --fail --silent --show-error --retry 24 --retry-delay 10 --retry-all-errors https://atlas.matejlukasik.com/incidents > /dev/null
